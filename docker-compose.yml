version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: phi-db
    environment:
      POSTGRES_USER: neon_user
      POSTGRES_PASSWORD: neon_secure_password
      POSTGRES_DB: phi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phi-api
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://neon_user:neon_secure_password@postgres:5432/phi
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phi-ui
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: phi-network
